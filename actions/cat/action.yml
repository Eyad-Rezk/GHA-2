#____________________________________________Custom Action for EC2 Instance_____________________________________________#
name: Action for EC2 Instance

description: custom action to take hostname , ip of machine , private key and ssh into the machine and run a command to create dir in this machine

inputs:
   hostname:
     description: 'The hostname of the machine'
     required: true
    
   ip:
     description: 'The IP address of the machine'
     required: true

   privatekey:
     description: 'The private key for SSH access'
     required: true

runs:
  using: composite
  steps:
    - name: Step-1 Create private key file
      shell: bash
      run: |
        echo "${{ inputs.privatekey }}" > key.pem
        chmod 600 key.pem

    - name: Step-2 SSH and create directory
      shell: bash
      run: |
        ssh -o StrictHostKeyChecking=no \
            -i key.pem \
            ${{ inputs.hostname }}@${{ inputs.ip }} \
            "mkdir -p /home/${{ inputs.hostname }}/new_directory"